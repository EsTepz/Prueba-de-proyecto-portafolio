<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Profesional | Esteban Flores</title>

<body>

    <header>
        <div class="profile-container">
            <img src="perfil.jpg" alt="Esteban Flores" class="profile-img">

            <p>Ingeniero en Sistemas Computacionales | Backend Developer</p>

                <img src="proyecto2.jpg" alt="Data Analysis">

                <a href="#" class="btn">Ver Proyecto</a>

        <p>© 2026 - Esteban Flores Castro| TESE</p>
    </footer>
